<html lang="ms">
<head>
  <meta charset="UTF-8"/>
  <script>(function(){try{if(localStorage.getItem('rl_theme')==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link rel="alternate icon" href="/favicon.svg"/>
  <link rel="apple-touch-icon" href="/favicon.svg"/>

  <link rel="canonical" href="https://www.resepilokal.com/chef-detail.html"/>
  <meta property="og:title" content="Chef — ResepiLokal"/>

  <meta name="twitter:image" content="https://www.resepilokal.com/images/og-default.png"/>

<body>

  <!-- ══════════════════════════════════════════
       NAVBAR
  ══════════════════════════════════════════ -->
  <nav class="navbar scrolled" id="navbar">
    <a href="/" class="nav-logo">
      <span class="nav-logo-text">Resepi<span>Lokal</span></span>
      <span class="nav-logo-badge">MY</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">Home</a></li>
      <li><a href="/chefs.html" class="active">Chef</a></li>
      <li><a href="/search.html">Semua Resepi</a></li>
    </ul>
    <div class="nav-search">
      <a href="/search.html" class="nav-search-btn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.8-3.8"/></svg></a>
      <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <!-- ══════════════════════════════════════════
       CHEF HERO
  ══════════════════════════════════════════ -->
  <div class="chef-hero" id="chefHero">
    <div class="chef-hero-bg" id="chefHeroBg"></div>
    <div class="chef-hero-overlay"></div>
    <div class="chef-hero-content">
      <div class="chef-hero-avatar">
        <img id="chefAvatar" src="" alt="Chef"/>
      </div>
      <div class="chef-hero-info">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;">
          <h1 class="chef-hero-name" id="chefName">—</h1>
          <span id="chefVerifiedBadge" style="display:none;background:var(--accent);color:#000;font-size:0.65rem;font-weight:800;padding:3px 8px;border-radius:4px;">✓ VERIFIED</span>
          <button type="button" id="pageFavBtn" class="btn btn-outline" style="padding:6px 14px;font-size:0.85rem;">♡ Kegemaran</button>
        </div>
        <div class="chef-hero-tags" id="chefTags"></div>
        <div class="chef-hero-followers">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg> <strong id="chefFollowers">—</strong> pengikut &nbsp;·&nbsp;
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12h20"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6"/><path d="m5 8 15-4"/></svg> <strong id="chefRecipeCount">—</strong> resepi
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       CHEF BIO + SOCIAL
  ══════════════════════════════════════════ -->
  <div style="padding:32px 5%;border-bottom:1px solid var(--border);background:var(--bg2);">
    <div style="max-width:760px;display:flex;gap:40px;flex-wrap:wrap;align-items:flex-start;">
      <div style="flex:1;min-width:260px;">
        <div class="section-eyebrow" style="margin-bottom:8px;">Tentang Chef</div>
        <p id="chefBio" style="color:var(--text-sub);line-height:1.75;font-size:0.95rem;">—</p>
      </div>
      <div id="chefSocial" style="display:flex;flex-direction:column;gap:10px;min-width:160px;"></div>
    </div>
    <div id="chefAttribution"></div>
    <div id="chefSupportCard"></div>
    <div id="chefRestaurantCard"></div>
  </div>

  <!-- ══════════════════════════════════════════
       AD BANNER
  ══════════════════════════════════════════ -->
  <div class="ad-banner" style="margin:20px 5% 0;">
    <!-- ✅ ADSENSE AD SLOT -->
    <p>[ Iklan / Advertisement ]</p>
  </div>

  <!-- ══════════════════════════════════════════
       CHEF RECIPES
  ══════════════════════════════════════════ -->
  <section style="padding:40px 0 20px;">
    <div class="section-header">
      <div class="section-title-group">
        <div class="section-eyebrow"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12h20"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6"/><path d="m5 8 15-4"/></svg> Koleksi</div>
        <h2 class="section-title" id="chefRecipesTitle">Resepi Chef</h2>
      </div>
    </div>

    <!-- Category filter chips -->
    <div class="filter-chips" style="padding:0 5%;margin-bottom:24px;" id="categoryChips">
      <div class="chip active" data-cat="all">Semua</div>
    </div>

    <!-- Recipe grid -->
    <div class="results-grid" id="chefRecipesGrid"></div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-state-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12h20"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6"/><path d="m5 8 15-4"/></svg></div>
      <h3>Tiada resepi dalam kategori ini</h3>
      <p>Cuba pilih kategori lain</p>
    </div>
  </section>

  <!-- ══════════════════════════════════════════
       MORE CHEFS ROW
  ══════════════════════════════════════════ -->
  <section style="background:var(--bg2);padding:48px 0;">
    <div class="section-header">
      <div class="section-title-group">
        <div class="section-eyebrow"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21a1 1 0 0 0 1-1v-5.3c0-.5.3-.9.7-1.1a4 4 0 0 0-2.1-7.6 5 5 0 0 0-9.2 0 4 4 0 0 0-2.1 7.6c.4.2.7.6.7 1V20a1 1 0 0 0 1 1z"/><path d="M6 17h12"/></svg> Terokai Lagi</div>
        <h2 class="section-title">Chef Lain</h2>
      </div>
      <a href="/chefs.html" class="section-link">Semua Chef →</a>
    </div>
    <div class="scroll-row" id="otherChefsRow"></div>
  </section>

  <!-- ══════════════════════════════════════════
       AD BOTTOM
  ══════════════════════════════════════════ -->
  <div class="ad-banner" style="margin:20px 5%;">
    <!-- ✅ ADSENSE AD SLOT -->
    <p>[ Iklan / Advertisement ]</p>
  </div>

  <!-- ══════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════ -->
  <footer class="footer"></footer>

  <!-- ══════════════════════════════════════════
       SCRIPTS
  ══════════════════════════════════════════ -->
  <script src="/data.js"></script>
  <script src="/icons.js"></script>
  <script>
    // Mobile nav
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });

    // Get chef ID from URL — supports both the clean static URL
    // (/chef/<id>.html) and the legacy query-string URL (?id=<id>)
    const params = new URLSearchParams(window.location.search);
    let chefId = params.get('id');
    if (!chefId) {
      const pathMatch = window.location.pathname.match(/\/chef\/([^\/]+)\.html$/);
      if (pathMatch) chefId = pathMatch[1];
    }

    // Redirect if no ID
    if (!chefId) window.location.href = '/chefs.html';

    const chef = getChefById(chefId);
    if (!chef) window.location.href = '/chefs.html';

    // ── Populate chef info ────────────────────
    document.title = `${chef.name} — ResepiLokal`;

    document.getElementById('chefHeroBg').style.backgroundImage = `url('${chef.cover}')`;

    const avatarEl = document.getElementById('chefAvatar');
    avatarEl.src = chef.image;
    avatarEl.onerror = () => {
      avatarEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(chef.name)}&background=f5a623&color=000&size=120`;
    };

    document.getElementById('chefName').textContent = chef.name;
    document.getElementById('pageFavBtn').dataset.chefId = chef.id;
    document.getElementById('chefFollowers').textContent = chef.followers;

    if (chef.verified) {
      document.getElementById('chefVerifiedBadge').style.display = 'inline';
    }

    // Tags / speciality
    const tagsEl = document.getElementById('chefTags');
    tagsEl.innerHTML = '';
    chef.speciality.forEach(s => {
      const t = document.createElement('span');
      t.className = 'tag';
      t.textContent = s;
      tagsEl.appendChild(t);
    });

    // Bio
    document.getElementById('chefBio').textContent = chef.bio;

    // Social links — real platform icons so people recognize them instantly
    const socialEl = document.getElementById('chefSocial');
    const socialLinks = [
      [chef.tiktok, 'tiktok', 'brand-tiktok', 'TikTok'],
      [chef.youtube, 'youtube', 'brand-youtube', 'YouTube'],
      [chef.instagram, 'instagram', 'brand-instagram', 'Instagram'],
      [chef.facebook, 'facebook', 'brand-facebook', 'Facebook'],
      [chef.website, 'web', 'brand-web', 'Laman Web'],
    ];
    // Full-replace (not +=) so this stays correct even when the script
    // re-runs on an already-baked page — additive insertion would duplicate.
    socialEl.innerHTML = socialLinks
      .filter(([url]) => url)
      .map(([url, iconName, brandClass, label]) => `
        <a href="${url}" target="_blank" rel="noopener" class="chip-icon-btn ${brandClass}" style="justify-content:center;">
          ${icon(iconName)} ${label}
        </a>`)
      .join('');

    // Attribution — always credit and link back to the original creator
    document.getElementById('chefAttribution').innerHTML = `
      <div class="attribution-bar" style="max-width:760px;">
        ${icon('tiktok')}
        <span>Semua video &amp; resepi di halaman ini milik <strong>${chef.name}</strong>.
        <a href="${chef.tiktok}" target="_blank" rel="noopener">${icon('link')} Lawati channel rasmi ↗</a></span>
      </div>
    `;

    // Support / official product section
    const supportEl = document.getElementById('chefSupportCard');
    if (chef.products && chef.products.length) {
      const links = chef.products.map(p => [
        p.shopee ? `<a href="${p.shopee}" target="_blank" rel="sponsored noopener" class="chip-icon-btn brand-shopee">${icon('shopee')} ${p.name}</a>` : '',
        p.tiktok ? `<a href="${p.tiktok}" target="_blank" rel="sponsored noopener" class="chip-icon-btn brand-tiktok">${icon('tiktok')} ${p.name}</a>` : '',
      ].join('')).join('');
      supportEl.innerHTML = `
        <div class="support-card" style="max-width:760px;">
          <h3><svg viewBox="0 0 48 48" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M14 16V13a10 10 0 0 1 20 0v3h5l2 26H7l2-26h5zm4 0h12v-3a6 6 0 0 0-12 0v3z"/></svg> Sokong ${chef.name}</h3>
          <p>Suka resepi ${chef.name}? Sokong terus dengan membeli produk rasmi beliau.</p>
          <div class="support-links">${links}</div>
        </div>
      `;
    } else if (chef.tiktok) {
      supportEl.innerHTML = `
        <div class="support-card" style="max-width:760px;">
          <h3><svg viewBox="0 0 48 48" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M14 16V13a10 10 0 0 1 20 0v3h5l2 26H7l2-26h5zm4 0h12v-3a6 6 0 0 0-12 0v3z"/></svg> Sokong ${chef.name}</h3>
          <p>Tiada kedai produk rasmi disahkan buat masa ini. Ikuti channel beliau untuk kempen sokongan atau produk terkini.</p>
          <div class="support-links">
            <a href="${chef.tiktok}" target="_blank" rel="noopener" class="chip-icon-btn brand-tiktok">${icon('tiktok')} Ikuti di TikTok</a>
          </div>
        </div>
      `;
    }

    // Restoran rasmi (jika chef ada perniagaan F&B fizikal)
    const restaurantEl = document.getElementById('chefRestaurantCard');
    if (chef.restaurant) {
      const r = chef.restaurant;
      const menu = (r.menu_highlights || [])
        .map(m => `<li><span>${m.name}</span><span>${m.price}</span></li>`).join('');
      const tips = (r.booking_tips || []).map(t => `<li>${t}</li>`).join('');
      restaurantEl.innerHTML = `
        <div class="support-card restaurant-card" style="max-width:760px;">
          <h3><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 3v6a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2V3M6.5 3v18"/><path d="M20 15V4a4 4 0 0 0-4 4v5a2 2 0 0 0 2 2h2zm0 0v6"/></svg> ${r.name} — Restoran Rasmi ${chef.name}</h3>
          <p class="restaurant-tagline">"${r.tagline}"</p>
          <p>${r.story}</p>
          <div class="restaurant-facts">
            <div><strong><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg> Lokasi</strong><span>${r.address}</span></div>
            <div><strong><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> Waktu Operasi</strong><span>${r.hours}</span></div>
            <div><strong><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 3v6a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2V3M6.5 3v18"/><path d="M20 15V4a4 4 0 0 0-4 4v5a2 2 0 0 0 2 2h2zm0 0v6"/></svg> Jenis Masakan</strong><span>${r.cuisine}</span></div>
          </div>
          ${menu ? `<h4>Menu Popular</h4><ul class="restaurant-menu">${menu}</ul>` : ''}
          ${tips ? `<h4>Cara Tempah Slot</h4><ul class="restaurant-tips">${tips}</ul>` : ''}
          <div class="support-links" style="margin-top:14px;">
            ${r.booking_url ? `<a href="${r.booking_url}" target="_blank" rel="noopener" class="btn btn-primary"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 9h18"/></svg> Tempah Meja</a>` : ''}
            ${r.website ? `<a href="${r.website}" target="_blank" rel="noopener" class="chip-icon-btn brand-web">${icon('web')} Laman Web Rasmi</a>` : ''}
          </div>
        </div>
      `;
    }

    // ── Recipes ───────────────────────────────
    const allRecipes = getRecipesByChef(chefId);
    document.getElementById('chefRecipeCount').textContent = allRecipes.length;
    document.getElementById('chefRecipesTitle').textContent = `Resepi ${chef.name}`;

    // Build category chips from this chef's recipes
    const cats = [...new Set(allRecipes.map(r => r.category))];
    const chipsEl = document.getElementById('categoryChips');
    chipsEl.querySelectorAll('.chip:not([data-cat="all"])').forEach(c => c.remove());
    cats.forEach(cat => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.dataset.cat = cat;
      chip.textContent = cat;
      chipsEl.appendChild(chip);
    });

    // Build recipe card (same as index.html)
    function buildRecipeCard(recipe) {
      // A real <a> (not a div + click listener) so the card works with a
      // single tap on mobile and is crawlable by search engines.
      const card = document.createElement('a');
      card.className = 'recipe-card animate-up';
      card.href = recipeUrl(recipe.id);
      card.dataset.recipeId = recipe.id;
      card.innerHTML = `
        <div class="recipe-card-thumb">
          <img src="${recipe.thumbnail}" alt="${recipe.title}" loading="lazy"/>
          <span class="recipe-card-cat">${recipe.category}</span>
          <div class="recipe-card-bottom">
            <div class="recipe-card-title">${recipe.title}</div>
            <div class="recipe-card-chef"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> ${recipe.cook_time} &nbsp;·&nbsp; <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 20v-6M12 20V4M18 20v-10"/></svg> ${recipe.difficulty}</div>
          </div>
        </div>
        <div class="recipe-card-hover">
          <div class="recipe-card-hover-title">${recipe.title}</div>
          <div class="recipe-card-hover-meta">
            <span><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> ${recipe.cook_time}</span>
            <span><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 3v6a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2V3M6.5 3v18"/><path d="M20 15V4a4 4 0 0 0-4 4v5a2 2 0 0 0 2 2h2zm0 0v6"/></svg> ${recipe.servings} org</span>
            <span><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 20v-6M12 20V4M18 20v-10"/></svg> ${recipe.difficulty}</span>
          </div>
          <p class="recipe-card-hover-desc">${recipe.description}</p>
          <span class="btn btn-primary"><svg viewBox="0 0 48 48" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M14 8l26 16-26 16z"/></svg> Tengok Resepi</span>
        </div>
      `;
      return card;
    }

    // Render recipes
    function renderRecipes(recipes) {
      const grid = document.getElementById('chefRecipesGrid');
      const empty = document.getElementById('emptyState');
      grid.innerHTML = '';
      if (!recipes.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      recipes.forEach((r, i) => {
        const card = buildRecipeCard(r);
        card.style.animationDelay = `${i * 0.08}s`;
        grid.appendChild(card);
      });
    }

    renderRecipes(allRecipes);

    // Filter by category chips
    chipsEl.addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      chipsEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      const cat = chip.dataset.cat;
      renderRecipes(cat === 'all' ? allRecipes : allRecipes.filter(r => r.category === cat));
    });

    // ── Other chefs row ───────────────────────
    const otherRow = document.getElementById('otherChefsRow');
    otherRow.innerHTML = '';
    CHEFS.filter(c => c.id !== chefId).forEach(c => {
      const card = document.createElement('a');
      card.className = 'chef-card';
      card.href = chefUrl(c.id);
      card.dataset.chefId = c.id;
      card.innerHTML = `
        <div class="chef-card-avatar">
          <img src="${c.image}" alt="${c.name}" loading="lazy"
            onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(c.name)}&background=f5a623&color=000&size=120'"/>
          ${c.verified ? '<div class="chef-verified">✓</div>' : ''}
        </div>
        <div class="chef-card-name">${c.name}</div>
        <div class="chef-card-count">${c.followers} pengikut</div>
      `;
      otherRow.appendChild(card);
    });

    // ── SEO: canonical + OG/Twitter + JSON-LD (idempotent) ──
    (function () {
      const SITE_BASE = 'https://www.resepilokal.com';
      const canonUrl = SITE_BASE + chefUrl(chef.id);
      const absImg = chef.image.indexOf('http') === 0 ? chef.image : SITE_BASE + chef.image;

      document.querySelectorAll(
        'link[rel="canonical"], meta[property^="og:"], meta[name="twitter:image"], meta[name="twitter:card"], script[type="application/ld+json"]'
      ).forEach(el => el.remove());

      const canon = document.createElement('link');
      canon.rel = 'canonical';
      canon.href = canonUrl;
      document.head.appendChild(canon);

      const desc = `${chef.name} — ${allRecipes.length} resepi video asli di ResepiLokal. ${chef.bio}`.slice(0, 200);
      let metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', desc);
      document.title = `${chef.name} — ResepiLokal`;

      const og = [
        ['og:title', chef.name + ' — ResepiLokal'],
        ['og:description', desc],
        ['og:image', absImg],
        ['og:url', canonUrl],
        ['og:type', 'profile'],
        ['og:site_name', 'ResepiLokal'],
      ];
      og.forEach(([p, c]) => {
        const m = document.createElement('meta');
        m.setAttribute('property', p);
        m.setAttribute('content', c);
        document.head.appendChild(m);
      });
      const twCard = document.createElement('meta');
      twCard.setAttribute('name', 'twitter:card');
      twCard.setAttribute('content', 'summary_large_image');
      document.head.appendChild(twCard);
      const twImg = document.createElement('meta');
      twImg.setAttribute('name', 'twitter:image');
      twImg.setAttribute('content', absImg);
      document.head.appendChild(twImg);

      const personLD = {
        '@context': 'https://schema.org',
        '@type': 'Person',
        name: chef.name,
        image: absImg,
        description: chef.bio,
        url: canonUrl,
        sameAs: [chef.tiktok, chef.youtube, chef.instagram, chef.facebook].filter(Boolean),
      };
      const crumbLD = {
        '@context': 'https://schema.org',
        '@type': 'BreadcrumbList',
        itemListElement: [
          { '@type': 'ListItem', position: 1, name: 'Home', item: SITE_BASE + '/' },
          { '@type': 'ListItem', position: 2, name: 'Chef', item: SITE_BASE + '/chefs.html' },
          { '@type': 'ListItem', position: 3, name: chef.name, item: canonUrl },
        ],
      };
      const listLD = {
        '@context': 'https://schema.org',
        '@type': 'ItemList',
        itemListElement: allRecipes.slice(0, 20).map((r, i) => ({
          '@type': 'ListItem',
          position: i + 1,
          url: SITE_BASE + recipeUrl(r.id),
          name: r.title,
        })),
      };
      [personLD, crumbLD, listLD].forEach(obj => {
        const s = document.createElement('script');
        s.type = 'application/ld+json';
        s.textContent = JSON.stringify(obj);
        document.head.appendChild(s);
      });
    })();
  </script>

  <script src="/site.js"></script>
</body>
</html>
